# Optional: apply when KUBESIGHT_AUTO_UPGRADE=true for kubeadm automation.
# Grants cordon/drain/node-debug permissions required for automated upgrades.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubesight-backend-upgrade
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch, patch]
  - apiGroups: [""]
    resources: [pods, pods/eviction, pods/log]
    verbs: [create, get, list, watch, delete]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [create, get, list, watch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesight-backend-upgrade
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubesight-backend-upgrade
subjects:
  - kind: ServiceAccount
    name: kubesight-backend
    namespace: kubesight
