  TELEGRAM_BOT_TOKEN: "REPLACE_WITH_TELEGRAM_BOT_TOKEN"
  # KubeSight API token — fill in before applying
  KUBESIGHT_API_TOKEN: "REPLACE_WITH_KUBESIGHT_API_TOKEN"
