apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubesight-ingress
  namespace: kubesight
spec:
  # Change to your controller class (nginx, traefik, etc.)
  ingressClassName: nginx
  rules:
    - host: kubesight.local
      http:
        paths:
          # API routes — Flask blueprints are under /api
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          # Health check — not under /api in this app
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          # Static React SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
