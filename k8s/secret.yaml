apiVersion: v1
kind: Secret
metadata:
  name: kubesight-secret
  namespace: kubesight
type: Opaque
stringData:
  # Postgres credentials (must match DATABASE_URL below)
  DATABASE_USER: "kubesight"
  DATABASE_PASSWORD: "kubesight"

  # Flask SQLAlchemy URL — host is the in-cluster Service name
  DATABASE_URL: "postgresql+psycopg2://kubesight:kubesight@postgres-service:5432/kubesight"

  # Replace before production deploy (openssl rand -hex 32)
  JWT_SECRET_KEY: "change-me-generate-with-openssl-rand-hex-32"
  FLASK_SECRET_KEY: "change-me-generate-with-openssl-rand-hex-32"
