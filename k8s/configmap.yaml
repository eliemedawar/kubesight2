apiVersion: v1
kind: ConfigMap
metadata:
  name: kubesight-config
  namespace: kubesight
data:

  APP_ENV: "production"
  FLASK_DEBUG: "false"
  AUTH_REQUIRED: "true"
  JWT_EXPIRY_HOURS: "8"
  DATABASE_NAME: "kubesight"
  K8S_REAL_MODE: "true"
  K8S_CONTEXT_NAME: "docker-desktop"
  KUBESIGHT_KUBECONFIG_DIR: "/data/kubeconfigs"
  HELM_BINARY: "helm"
  ALERT_CPU_THRESHOLD_PERCENT: "80"
  CORS_ORIGINS: "http://kubesight.local"
  PUBLIC_API_URL: ""
  # Set to "true" to enable automated kubeadm/minikube upgrades (not Docker Desktop).
  KUBESIGHT_AUTO_UPGRADE: "true"
