apiVersion: v1
kind: PersistentVolume
metadata:
  name: hermes-data-pv
spec:
  storageClassName: manual
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    # Directory on the Kubernetes node where Hermes data will be stored.
    # Create it first: mkdir -p /mnt/data/hermes
    path: /mnt/data/hermes
    type: DirectoryOrCreate
  # Bind this PV exclusively to the Hermes PVC
  claimRef:
    name: hermes-data
    namespace: kubesight
