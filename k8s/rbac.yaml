apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubesight-backend
  namespace: kubesight
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubesight-backend-reader
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - pods/log
      - services
      - endpoints
      - namespaces
      - events
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: [get, list, watch]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesight-backend-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubesight-backend-reader
subjects:
  - kind: ServiceAccount
    name: kubesight-backend
    namespace: kubesight
