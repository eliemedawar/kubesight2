# Ephemeral PostgreSQL for backend integration tests.
# Start: docker compose -f docker-compose.test.yml up -d
# Run:   TEST_DATABASE_URL=postgresql://kubesight_test:kubesight_test@localhost:5433/kubesight_test pytest backend/tests

services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_DB: kubesight_test
      POSTGRES_USER: kubesight_test
      POSTGRES_PASSWORD: kubesight_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubesight_test -d kubesight_test"]
      interval: 2s
      timeout: 5s
      retries: 10
