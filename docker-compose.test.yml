# PostgreSQL for CI / local integration tests (port 5433 avoids clashing with dev Postgres).
# Usage:
#   docker compose -f docker-compose.test.yml up -d --wait
#   TEST_DATABASE_URL=postgresql://kubesight_test:kubesight_test@localhost:5433/kubesight_test python -m pytest backend/tests

services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_DB: kubesight_test
      POSTGRES_USER: kubesight_test
      POSTGRES_PASSWORD: kubesight_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubesight_test -d kubesight_test"]
      interval: 5s
      timeout: 5s
      retries: 10
