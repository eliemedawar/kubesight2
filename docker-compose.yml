# KubeSight PostgreSQL (production / local with Postgres)
# Start:  docker compose up -d
# Stop:   docker compose down
# Data persists in volume kubesight_pg_data

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kubesight
      POSTGRES_USER: kubesight
      POSTGRES_PASSWORD: kubesight
    ports:
      - "5432:5432"
    volumes:
      - kubesight_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubesight -d kubesight"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  kubesight_pg_data:
